<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تسجيل الدخول - Warehouse Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo h2 {
      font-size: 20px;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .logo p {
      font-size: 13px;
      color: #888;
    }

    label {
      font-size: 13px;
      color: #555;
      display: block;
      margin-bottom: 6px;
      margin-top: 1rem;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
      text-align: right;
    }

    input:focus { border-color: #4f63ff; }

    button {
      width: 100%;
      padding: 11px;
      background: #4f63ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: background 0.2s;
    }

    button:hover { background: #3a4ecc; }
    button:disabled { background: #aaa; cursor: not-allowed; }

    .error {
      color: #e53935;
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h2>🏭 Warehouse Tool</h2>
      <p>سجّل دخولك للمتابعة</p>
    </div>

    <label>البريد الإلكتروني</label>
    <input id="email" type="email" placeholder="example@email.com" />

    <label>كلمة المرور</label>
    <input id="password" type="password" placeholder="••••••••" />

    <button id="loginBtn">تسجيل الدخول</button>
    <p class="error" id="errorMsg"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB_Z5mz_piSipTtivV0ChIJxzuDd7C0OJw",
      authDomain: "warehouse-tool-559c0.firebaseapp.com",
      projectId: "warehouse-tool-559c0",
      storageBucket: "warehouse-tool-559c0.firebasestorage.app",
      messagingSenderId: "522041647199",
      appId: "1:522041647199:web:cf02ca42d76b8821887bea"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("loginBtn");
      const errMsg = document.getElementById("errorMsg");

      if (!email || !password) {
        errMsg.textContent = "من فضلك اكتب الإيميل وكلمة المرور";
        return;
      }

      btn.disabled = true;
      btn.textContent = "جاري الدخول...";
      errMsg.textContent = "";

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "index.html";
      } catch (err) {
        errMsg.textContent = "الإيميل أو كلمة المرور غلط، حاول تاني";
        btn.disabled = false;
        btn.textContent = "تسجيل الدخول";
      }
    });
  </script>
</body>
</html>
